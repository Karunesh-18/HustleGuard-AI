services:
  - type: web
    name: hustleguard-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOW_ML_TRAINING
        value: "0"
      - key: ENABLE_ZONE_REFRESH_LOOP
        value: "0"
      - key: PRELOAD_ML_AT_STARTUP
        value: "0"
